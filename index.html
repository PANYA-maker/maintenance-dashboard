<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrugator Production Dashboard</title>
    <!-- โหลด Library พื้นฐาน -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700;800&display=swap');
        body { 
            background-color: #f1f5f9; 
            font-family: 'Sarabun', sans-serif; 
            margin: 0;
            padding: 0;
        }
        .error-box {
            background: #fee2e2;
            color: #b91c1c;
            padding: 20px;
            border-radius: 12px;
            margin: 20px;
            border: 1px solid #ef4444;
        }
    </style>
</head>
<body>
    <div id="root">
        <div id="loading-state" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #64748b;">
            <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">📊 กำลังโหลด Dashboard...</div>
            <div style="font-size: 14px;">หากหน้าจอนี้ค้างนานเกิน 10 วินาที อาจเกิดจากอินเทอร์เน็ตบล็อกสคริปต์</div>
            <div id="error-display"></div>
        </div>
    </div>

    <script type="text/babel">
        // ตรวจสอบความพร้อมของ Library
        window.onerror = function(msg, url, line) {
            const errDisplay = document.getElementById('error-display');
            if (errDisplay) {
                errDisplay.innerHTML = `<div class="error-box"><strong>พบข้อผิดพลาด:</strong> ${msg} <br/> <small>ที่บรรทัด: ${line}</small></div>`;
            }
            return false;
        };

        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, LineChart, Line } = Recharts;

        const App = () => {
            const [selectedDate, setSelectedDate] = React.useState("8/12/2025");
            
            // ข้อมูลสรุปจากไฟล์ CSV (BHS, ISOWA, YUELI)
            const rawData = [
                { date: "8/12/2025", machine: "BHS", shift: "A", weight: 348.9, waste: 5.4, speed: 103, downtime: 0 },
                { date: "8/12/2025", machine: "BHS", shift: "B", weight: 310.2, waste: 8.1, speed: 98, downtime: 450 },
                { date: "8/12/2025", machine: "ISOWA", shift: "A", weight: 450.5, waste: 12.3, speed: 125, downtime: 300 },
                { date: "8/12/2025", machine: "ISOWA", shift: "B", weight: 410.8, waste: 9.8, speed: 112, downtime: 180 },
                { date: "8/12/2025", machine: "YUELI", shift: "A", weight: 289.1, waste: 7.2, speed: 94, downtime: 327 },
                { date: "8/12/2025", machine: "YUELI", shift: "B", weight: 265.4, waste: 14.5, speed: 82, downtime: 540 },
                { date: "13/8/2025", machine: "ISOWA", shift: "A", weight: 757.1, waste: 22.4, speed: 132, downtime: 0 },
                { date: "13/8/2025", machine: "BHS", shift: "A", weight: 680.4, waste: 18.2, speed: 105, downtime: 240 },
                { date: "13/8/2025", machine: "YUELI", shift: "A", weight: 510.2, waste: 15.5, speed: 92, downtime: 120 }
            ];

            const filteredData = React.useMemo(() => {
                return rawData.filter(d => d.date === selectedDate);
            }, [selectedDate]);

            const machines = ['BHS', 'ISOWA', 'YUELI'];
            const chartData = React.useMemo(() => {
                return machines.map(m => {
                    const sA = filteredData.find(d => d.machine === m && d.shift === 'A') || { weight: 0, waste: 0, speed: 0, downtime: 0 };
                    const sB = filteredData.find(d => d.machine === m && d.shift === 'B') || { weight: 0, waste: 0, speed: 0, downtime: 0 };
                    return {
                        name: m,
                        weightA: sA.weight, weightB: sB.weight,
                        wasteA: sA.waste, wasteB: sB.waste,
                        speedA: sA.speed, speedB: sB.speed,
                        downtimeA: Math.round(sA.downtime / 60), downtimeB: Math.round(sB.downtime / 60)
                    };
                });
            }, [filteredData]);

            const formatNum = (n) => new Intl.NumberFormat('th-TH').format(n);

            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [selectedDate, filteredData]);

            return (
                <div className="min-h-screen pb-10 animate-in fade-in duration-500">
                    <header className="bg-white border-b border-slate-200 px-6 py-5 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-2.5 rounded-xl text-white">
                                    <i data-lucide="bar-chart-3" className="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800 tracking-tight leading-none uppercase">Corrugator <span className="text-indigo-600">Analytics</span></h1>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">เปรียบเทียบ BHS | ISOWA | YUELI</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2 bg-slate-100 p-2 rounded-2xl border border-slate-200">
                                <i data-lucide="calendar" className="w-4 h-4 text-indigo-500 ml-2"></i>
                                <input 
                                    type="text" 
                                    value={selectedDate} 
                                    onChange={(e) => setSelectedDate(e.target.value)} 
                                    className="bg-transparent border-none focus:outline-none font-bold text-slate-700 w-32 text-sm px-2"
                                    placeholder="ว/ด/ปปปป"
                                />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {/* KPI Cards */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8 text-center">
                            <StatCard title="นน. ผลิตรวม (กก.)" value={formatNum(filteredData.reduce((a,b)=>a+b.weight, 0))} color="blue" icon="package" />
                            <StatCard title="สปีดเฉลี่ย (m/min)" value={filteredData.length ? Math.round(filteredData.reduce((a,b)=>a+b.speed, 0)/filteredData.length) : 0} color="emerald" icon="zap" />
                            <StatCard title="ของเสียสะสม (กก.)" value={formatNum(filteredData.reduce((a,b)=>a+b.waste, 0))} color="rose" icon="trash-2" />
                            <StatCard title="เวลาหยุดรวม (นาที)" value={formatNum(Math.round(filteredData.reduce((a,b)=>a+b.downtime, 0)/60))} color="amber" icon="clock" />
                        </div>

                        {/* Charts Area */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <ChartBox title="1. น้ำหนักการผลิตเปรียบเทียบ (กก.)">
                                <div className="h-[300px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={chartData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                            <XAxis dataKey="name" />
                                            <YAxis />
                                            <Tooltip />
                                            <Legend />
                                            <Bar dataKey="weightA" name="กะ A" fill="#4f46e5" radius={[4, 4, 0, 0]} />
                                            <Bar dataKey="weightB" name="กะ B" fill="#a5b4fc" radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </ChartBox>

                            <ChartBox title="2. ของเสียเปรียบเทียบ (กก.)">
                                <div className="h-[300px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={chartData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                            <XAxis dataKey="name" />
                                            <YAxis />
                                            <Tooltip />
                                            <Legend />
                                            <Bar dataKey="wasteA" name="กะ A" fill="#e11d48" radius={[4, 4, 0, 0]} />
                                            <Bar dataKey="wasteB" name="กะ B" fill="#fda4af" radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </ChartBox>
                        </div>
                    </main>
                </div>
            );
        };

        const StatCard = ({ title, value, color, icon }) => {
            const styles = { blue: "bg-blue-50 text-blue-600", emerald: "bg-emerald-50 text-emerald-600", rose: "bg-rose-50 text-rose-600", amber: "bg-amber-50 text-amber-600" };
            return (
                <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-between h-40">
                    <div className={`p-3 rounded-2xl w-fit mx-auto md:mx-0 ${styles[color]}`}>
                        <i data-lucide={icon} className="w-5 h-5"></i>
                    </div>
                    <div>
                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">{title}</p>
                        <h2 className="text-2xl font-black text-slate-800">{value}</h2>
                    </div>
                </div>
            );
        };

        const ChartBox = ({ title, children }) => (
            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <h3 className="font-bold text-slate-800 mb-6">{title}</h3>
                {children}
            </div>
        );

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
