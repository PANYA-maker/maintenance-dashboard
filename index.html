<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrugator Executive Analytics - Point System v9</title>
    <!-- Library Setup -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700;800&display=swap');
        body { background-color: #f8fafc; font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; }
        .dashboard-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .chart-container { position: relative; height: 320px; width: 100%; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .table-sticky-col { position: sticky; left: 0; background-color: white; z-index: 10; border-right: 2px solid #f1f5f9; }
        .trophy-1 { color: #fbbf24; fill: #fef3c7; } 
        .trophy-2 { color: #94a3b8; fill: #f1f5f9; } 
        .trophy-3 { color: #b45309; fill: #ffedd5; }
        .analysis-gradient { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); border-left: 6px solid #0284c7; }
        input[type="date"] { border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.25rem 0.5rem; font-weight: bold; color: #1e293b; }
    </style>
</head>
<body class="pb-24">

    <div id="loadingOverlay" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600 mb-4"></div>
        <p class="font-bold text-slate-700 animate-pulse text-lg text-center">กำลังประมวลผลข้อมูลและจัดอันดับคะแนน...</p>
    </div>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg"><i data-lucide="layout-dashboard"></i></div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 uppercase italic leading-none">Corrugator <span class="text-indigo-600">Analytics</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 italic">V9.0 Point-Based Ranking System</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3 bg-indigo-50 p-2 rounded-2xl border border-indigo-100">
                <div class="flex flex-col px-4 border-r border-indigo-100">
                    <span class="text-[9px] font-bold text-indigo-600 uppercase text-center mb-1 italic">เลือกช่วงวันที่บริหาร</span>
                    <div class="flex gap-2 items-center">
                        <input type="date" id="dateFrom">
                        <span class="text-indigo-300 font-bold">-</span>
                        <input type="date" id="dateTo">
                    </div>
                </div>
                <button onclick="fetchSheetData()" class="bg-white text-indigo-600 px-6 py-3 rounded-xl text-xs font-black shadow-sm border border-indigo-100 hover:bg-indigo-50 transition-all flex items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Sync Data
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-8 space-y-12">

        <!-- AI ANALYSIS SECTION -->
        <section id="executive-summary" class="dashboard-card analysis-gradient border-none hidden">
            <div class="flex items-center gap-3 mb-6">
                <div class="p-2 bg-white rounded-xl shadow-sm"><i data-lucide="award" class="text-indigo-600"></i></div>
                <h2 class="text-lg font-black text-slate-800 tracking-tight uppercase">Champion Performance (Point System)</h2>
            </div>
            <div id="analysis-content" class="grid grid-cols-1 lg:grid-cols-4 gap-8"></div>
        </section>

        <div id="dashboard-content" class="space-y-12">
            <div class="py-20 text-center text-slate-400 font-bold italic">เลือกวันที่แล้วกด Sync Data เพื่อเริ่มต้น</div>
        </div>
    </main>

    <script>
        Chart.register(ChartDataLabels);
        const SHEET_ID = '1PkoOBQxGMZqvOTWH9KQvSRyYL40ArK_3X0eeOjG80eY';
        const MACHINES = ['BHS', 'YUELI', 'ISOWA'];
        const SHEETS = { loss: 'เวลาสูญเสีย', op: 'เวลาเดินงาน', met: 'เมตร', sh: 'ขาดจำนวน' };

        let appState = { raw: {}, charts: {} };
        const formatNum = (n) => new Intl.NumberFormat('th-TH').format(Math.round(n || 0));

        async function fetchSheetData() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                for (let key in SHEETS) {
                    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEETS[key])}`);
                    const text = await res.text();
                    if (text.includes('<html')) throw new Error(`ชีท ${SHEETS[key]} ยังไม่ได้ Publish เป็น CSV`);
                    appState.raw[key] = parseCSV(text);
                }
                renderDashboard();
            } catch (err) { alert(err.message); }
            finally { document.getElementById('loadingOverlay').style.display = 'none'; }
        }

        function parseCSV(csv) {
            const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
            return lines.slice(1).map(line => {
                const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                const obj = {}; headers.forEach((h, idx) => obj[h] = row[idx]);
                return obj;
            });
        }

        function renderDashboard() {
            const dStart = new Date(document.getElementById('dateFrom').value);
            const dEnd = new Date(document.getElementById('dateTo').value);
            if (isNaN(dStart) || isNaN(dEnd)) return;
            dStart.setHours(0,0,0,0); dEnd.setHours(23,59,59,999);

            const filter = (key) => appState.raw[key]?.filter(r => {
                const d = r['วันที่']?.split('/') || [];
                const date = new Date(d[2]>2500?d[2]-543:d[2], d[1]-1, d[0]);
                return date >= dStart && date <= dEnd;
            }) || [];

            const stats = MACHINES.map(m => {
                const sum = (data, col) => data.reduce((acc, r) => acc + (parseFloat(r[col]) || 0), 0);
                const l = filter('loss'), o = filter('op'), met = filter('met'), sh = filter('sh');
                
                const la = sum(l, `${m} เวลาสูญเสียกะ A`), lb = sum(l, `${m} เวลาสูญเสียกะ B`);
                const opa = sum(o, `${m} เวลาเดินงานทั้งหมดกะ A`), opb = sum(o, `${m} เวลาเดินงานทั้งหมดกะ B`);
                const ma = sum(met, `${m} กะ A`), mb = sum(met, `${m} กะ B`);
                const shaO = sum(sh, `${m} กะ A เดินงาน order`), shbO = sum(sh, `${m} กะ B เดินงาน order`);
                const shaM = sum(sh, `${m} กะ A ขาด`), shbM = sum(sh, `${m} กะ B ขาด`);

                return {
                    name: m, la, lb, opa, opb, ma, mb, shaO, shbO, shaM, shbM,
                    totalOp: opa+opb, totalMet: ma+mb, totalLoss: la+lb, totalOrd: shaO+shbO, totalMiss: shaM+shbM,
                    get speed() { return this.totalOp > 0 ? this.totalMet/this.totalOp : 0 },
                    get lossP() { return this.totalOp > 0 ? (this.totalLoss/this.totalOp)*100 : 0 },
                    get shortP() { return this.totalOrd > 0 ? (this.totalMiss/this.totalOrd)*100 : 0 },
                    points: 0 // Will calculate below
                };
            });

            document.getElementById('executive-summary').classList.remove('hidden');
            calculatePointsAndRender(stats);
            renderUI(stats);
            lucide.createIcons();
        }

        function calculatePointsAndRender(stats) {
            // Filter only active machines (must have production)
            const activeMachines = stats.filter(s => s.totalOp > 0);
            
            if (activeMachines.length > 0) {
                // 1. Rank Speed (Higher is better)
                activeMachines.sort((a, b) => b.speed - a.speed);
                activeMachines.forEach((s, idx) => s.points += (3 - idx > 0 ? 3 - idx : 1));

                // 2. Rank Loss% (Lower is better)
                activeMachines.sort((a, b) => a.lossP - b.lossP);
                activeMachines.forEach((s, idx) => s.points += (3 - idx > 0 ? 3 - idx : 1));

                // 3. Rank Shortage% (Lower is better)
                activeMachines.sort((a, b) => a.shortP - b.shortP);
                activeMachines.forEach((s, idx) => s.points += (3 - idx > 0 ? 3 - idx : 1));
            }

            // Determine Champion (Rank by total points)
            const ranked = [...stats].sort((a, b) => b.points - a.points);
            const champ = ranked[0];
            
            document.getElementById('analysis-content').innerHTML = `
                <div class="lg:col-span-1 flex flex-col items-center justify-center p-6 bg-white rounded-3xl shadow-sm border-2 border-amber-200">
                    <div class="text-[10px] font-black uppercase text-amber-600 mb-2">Champion Performance</div>
                    <i data-lucide="award" class="w-16 h-16 trophy-1 mb-4"></i>
                    <div class="text-3xl font-black text-slate-800 tracking-tighter">${champ.points > 0 ? champ.name : 'N/A'}</div>
                    <div class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[10px] font-black mt-2 uppercase">
                        ${champ.points} TOTAL POINTS
                    </div>
                </div>
                <div class="lg:col-span-3 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${stats.map(s => `
                            <div class="p-4 rounded-2xl bg-white/40 border border-white/50 space-y-2">
                                <div class="font-black text-slate-700 flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <div class="w-2 h-2 rounded-full ${s.totalOp > 0 ? 'bg-indigo-500' : 'bg-slate-300'}"></div> ${s.name}
                                    </div>
                                    <span class="text-xs ${s.totalOp > 0 ? 'text-indigo-600' : 'text-slate-400'} font-black">${s.points} Pts</span>
                                </div>
                                <div class="text-[11px] leading-relaxed text-slate-500 italic">
                                    ${s.totalOp > 0 ? 
                                        `<b>จุดเด่น:</b> ${s.speed > 110 ? 'สปีดเดินงานยอดเยี่ยม' : (s.lossP < 8 ? 'คุมเวลาสูญเสียได้นิ่ง' : 'ประสิทธิภาพคงที่')}<br/>
                                         <b>ปรับปรุง:</b> ${s.lossP > 12 ? 'ลดเวลาหยุดกะ '+(s.la > s.lb ? 'A':'B') : 'รักษามาตรฐานออเดอร์'}` : 
                                        '<span class="text-rose-400">** ไม่มีการเดินงานในช่วงนี้ (0 คะแนน)</span>'}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="bg-indigo-900 text-white p-4 rounded-2xl flex items-start gap-4 shadow-lg border-l-4 border-amber-400">
                        <i data-lucide="info" class="text-amber-400 mt-1 w-5 h-5 shrink-0"></i>
                        <div class="text-[11px] font-medium leading-relaxed">
                            <p class="font-bold text-amber-300 mb-1">เกณฑ์การตัดสินแชมป์ (Ranking Score):</p>
                            ระบบนับคะแนนจาก 3 ตารางอันดับด้านล่าง: อันดับ 1 (ทอง) = 3 คะแนน | อันดับ 2 (เงิน) = 2 คะแนน | อันดับ 3 (ทองแดง) = 1 คะแนน
                            <br/><span class="opacity-70">** เครื่องจักรที่ไม่ได้เดินงาน (Total Operational Time = 0) จะไม่ถูกนำมารวมในการจัดอันดับและได้ 0 คะแนน</span>
                        </div>
                    </div>
                </div>`;
        }

        function renderUI(stats) {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${kpiCard('Gauge', 'สปีดเฉลี่ยรวม', (stats.reduce((a,s)=>a+s.totalMet,0)/stats.reduce((a,s)=>a+s.totalOp,0)||0).toFixed(1), 'm/min', 'indigo')}
                    ${kpiCard('Clock', 'สูญเสียรวม', (stats.reduce((a,s)=>a+s.totalLoss,0)/stats.reduce((a,s)=>a+s.totalOp,0)*100||0).toFixed(1), '%', 'rose')}
                    ${kpiCard('Clipboard', 'งานขาดรวม', (stats.reduce((a,s)=>a+s.totalMiss,0)/stats.reduce((a,s)=>a+s.totalOrd,0)*100||0).toFixed(1), '%', 'blue')}
                </div>
                ${renderTableSection('1. ประสิทธิภาพความเร็ว', stats, 'speed')}
                ${renderTableSection('2. การวิเคราะห์เวลาสูญเสีย', stats, 'loss')}
                ${renderTableSection('3. งานขาดจำนวน', stats, 'short')}
            `;
        }

        function kpiCard(icon, lbl, val, unit, col) {
            return `<div class="dashboard-card border-t-4 border-t-${col}-500 flex items-center gap-4"><div class="p-3 bg-${col}-50 text-${col}-600 rounded-xl"><i data-lucide="${icon.toLowerCase()}"></i></div><div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${lbl}</p><p class="text-2xl font-black text-slate-800">${val} <span class="text-xs font-bold text-slate-400">${unit}</span></p></div></div>`;
        }

        function renderTableSection(title, stats, type) {
            const getRankedStats = (sList, t) => {
                const active = sList.filter(s => s.totalOp > 0);
                if (t === 'speed') active.sort((a,b) => b.speed - a.speed);
                else if (t === 'loss') active.sort((a,b) => a.lossP - b.lossP);
                else if (t === 'short') active.sort((a,b) => a.shortP - b.shortP);
                
                // Return original stats with their rank added
                return sList.map(s => {
                    const rankIdx = active.findIndex(a => a.name === s.name);
                    return { ...s, rank: s.totalOp > 0 ? rankIdx + 1 : 99 };
                }).sort((a,b) => a.rank - b.rank);
            };

            const h = (c1, c2, c3, bg) => `<thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-500 border-b"><tr><th rowspan="2" class="px-6 py-4 text-left border-r table-sticky-col w-[250px]">อันดับ / เครื่องจักร</th><th colspan="3" class="py-2 border-r ${bg}">กะ A</th><th colspan="3" class="py-2 border-r">กะ B</th><th colspan="3" class="py-2 bg-slate-100">รวม</th></tr><tr class="text-[9px] border-b"><th class="py-2 border-r">${c1}</th><th class="py-2 border-r">${c2}</th><th class="py-2 border-r">${c3}</th><th class="py-2 border-r">${c1}</th><th class="py-2 border-r">${c2}</th><th class="py-2 border-r">${c3}</th><th class="py-2 border-r">${c1}</th><th class="py-2 border-r">${c2}</th><th class="py-2 font-black">${c3}</th></tr></thead>`;
            
            const rankedStats = getRankedStats(stats, type);
            let content = '';
            
            if(type==='speed') {
                content = h('นาที','เมตร','Speed','bg-indigo-50/50') + rankedStats.map(s=>`<tr><td class="px-6 py-4 table-sticky-col text-left font-black border-r">${s.rank < 10 ? '<i data-lucide="trophy" class="inline-block w-4 h-4 mr-2 trophy-'+s.rank+'"></i>':''}${s.name}</td><td>${formatNum(s.opa)}</td><td class="text-emerald-600 font-bold">${formatNum(s.ma)}</td><td>${(s.ma/(s.opa||1)).toFixed(1)}</td><td class="border-l">${formatNum(s.opb)}</td><td class="text-emerald-600 font-bold">${formatNum(s.mb)}</td><td>${(s.mb/(s.opb||1)).toFixed(1)}</td><td class="border-l font-bold">${formatNum(s.totalOp)}</td><td class="font-bold">${formatNum(s.totalMet)}</td><td class="bg-emerald-50 font-black">${s.speed.toFixed(1)}</td></tr>`).join('');
            } else if(type==='loss') {
                content = h('เดินงาน','สูญเสีย','%','bg-rose-50/50') + rankedStats.map(s=>`<tr><td class="px-6 py-4 table-sticky-col text-left font-black border-r">${s.rank < 10 ? '<i data-lucide="trophy" class="inline-block w-4 h-4 mr-2 trophy-'+s.rank+'"></i>':''}${s.name}</td><td>${formatNum(s.opa)}</td><td class="text-rose-500 font-bold">${formatNum(s.la)}</td><td>${(s.la/(s.opa||1)*100).toFixed(1)}%</td><td class="border-l">${formatNum(s.opb)}</td><td class="text-rose-500 font-bold">${formatNum(s.lb)}</td><td>${(s.lb/(s.opb||1)*100).toFixed(1)}%</td><td class="border-l font-bold">${formatNum(s.totalOp)}</td><td class="font-bold text-rose-600">${formatNum(s.totalLoss)}</td><td class="bg-rose-50 font-black">${s.lossP.toFixed(1)}%</td></tr>`).join('');
            } else if(type==='short') {
                content = h('ออเดอร์','ขาด','%','bg-indigo-50/50') + rankedStats.map(s=>`<tr><td class="px-6 py-4 table-sticky-col text-left font-black border-r">${s.rank < 10 ? '<i data-lucide="trophy" class="inline-block w-4 h-4 mr-2 trophy-'+s.rank+'"></i>':''}${s.name}</td><td>${formatNum(s.shaO)}</td><td class="text-rose-500 font-bold">${formatNum(s.shaM)}</td><td>${(s.shaO>0?s.shaM/s.shaO*100:0).toFixed(1)}%</td><td class="border-l">${formatNum(s.shbO)}</td><td class="text-rose-500 font-bold">${formatNum(s.shbM)}</td><td>${(s.shbO>0?s.shbM/s.shbO*100:0).toFixed(1)}%</td><td class="border-l font-bold">${formatNum(s.totalOrd)}</td><td class="font-bold text-rose-700">${formatNum(s.totalMiss)}</td><td class="bg-indigo-50 font-black underline underline-offset-4">${s.shortP.toFixed(1)}%</td></tr>`).join('');
            }
            
            return `<div class="space-y-4"><h3 class="font-black text-slate-800 uppercase tracking-tighter">${title}</h3><div class="bg-white rounded-3xl border overflow-hidden shadow-sm"><table class="w-full text-center border-collapse min-w-[1000px] text-sm">${content}</table></div></div>`;
        }

        window.onload = () => {
            const now = new Date(); const yes = new Date(now); yes.setDate(now.getDate()-1);
            document.getElementById('dateFrom').value = yes.toISOString().substring(0,10);
            document.getElementById('dateTo').value = now.toISOString().substring(0,10);
            lucide.createIcons();
        };
    </script>
</body>
</html>
